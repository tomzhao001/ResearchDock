services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: paper_archive
      POSTGRES_USER: paper_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper_user -d paper_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: paper_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: paper_archive
      APP_SECRET_KEY: ${APP_SECRET_KEY:-please_change_me_in_production}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      FILE_STORAGE_PATH: /data/files
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      OCR_PROVIDER: ${OCR_PROVIDER:-glm_ocr}
      LLM_OCR_BASE_URL: ${LLM_OCR_BASE_URL:-https://api.z.ai/api/paas/v4/layout_parsing}
      LLM_OCR_API_KEY: ${LLM_OCR_API_KEY:-}
      LLM_OCR_MODEL: ${LLM_OCR_MODEL:-glm-ocr}
      LLM_OCR_TIMEOUT_SECONDS: ${LLM_OCR_TIMEOUT_SECONDS:-120}
      LLM_OCR_MAX_RETRIES: ${LLM_OCR_MAX_RETRIES:-2}
      LLM_OCR_RETRY_BACKOFF_SECONDS: ${LLM_OCR_RETRY_BACKOFF_SECONDS:-0.5}
      LLM_OCR_VERIFY_SSL: "${LLM_OCR_VERIFY_SSL:-true}"
    volumes:
      - files_data:/data/files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build: ./backend
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: paper_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: paper_archive
      FILE_STORAGE_PATH: /data/files
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      OCR_PROVIDER: ${OCR_PROVIDER:-glm_ocr}
      LLM_OCR_BASE_URL: ${LLM_OCR_BASE_URL:-https://api.z.ai/api/paas/v4/layout_parsing}
      LLM_OCR_API_KEY: ${LLM_OCR_API_KEY:-}
      LLM_OCR_MODEL: ${LLM_OCR_MODEL:-glm-ocr}
      LLM_OCR_TIMEOUT_SECONDS: ${LLM_OCR_TIMEOUT_SECONDS:-120}
      LLM_OCR_MAX_RETRIES: ${LLM_OCR_MAX_RETRIES:-2}
      LLM_OCR_RETRY_BACKOFF_SECONDS: ${LLM_OCR_RETRY_BACKOFF_SECONDS:-0.5}
      LLM_OCR_VERIFY_SSL: "${LLM_OCR_VERIFY_SSL:-true}"
    volumes:
      - files_data:/data/files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_EDITOR_BASE_URL: ${PUBLIC_ORIGIN:-http://localhost:3000}/n8n/
      WEBHOOK_URL: ${PUBLIC_ORIGIN:-http://localhost:3000}/n8n/
      N8N_PROXY_HOPS: 1
      N8N_PATH: /n8n/
      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_PORT: 5678
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      TZ: ${GENERIC_TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
  files_data:
