x-backend-common-env: &backend-common-env
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_USER: paper_user
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
  POSTGRES_DB: paper_archive
  DATABASE_URL: ${DATABASE_URL:-}
  FILE_STORAGE_PATH: /data/files
  REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CELERY_TASK_ALWAYS_EAGER: "${CELERY_TASK_ALWAYS_EAGER:-false}"
  LLM_PROVIDER: ${LLM_PROVIDER:-auto}
  LLM_CHAT_TIMEOUT_SECONDS: ${LLM_CHAT_TIMEOUT_SECONDS:-300}
  LLM_CHAT_MAX_RETRIES: ${LLM_CHAT_MAX_RETRIES:-2}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  GLM_BASE_URL: ${GLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
  GLM_API_KEY: ${GLM_API_KEY:-}
  GLM_MODEL: ${GLM_MODEL:-glm-4.7}
  GLM_TIMEOUT_SECONDS: ${GLM_TIMEOUT_SECONDS:-120}
  GLM_VERIFY_SSL: "${GLM_VERIFY_SSL:-true}"
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-auto}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
  OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-120}
  OPENAI_VERIFY_SSL: "${OPENAI_VERIFY_SSL:-true}"
  GLM_EMBEDDING_MODEL: ${GLM_EMBEDDING_MODEL:-embedding-3}
  GLM_EMBEDDING_DIMENSIONS: ${GLM_EMBEDDING_DIMENSIONS:-1024}
  GLM_RERANK_MODEL: ${GLM_RERANK_MODEL:-rerank}
  RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-1000}
  RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-150}
  RAG_TOP_K: ${RAG_TOP_K:-5}
  RAG_SPARSE_TOP_K: ${RAG_SPARSE_TOP_K:-20}
  RAG_DENSE_TOP_K: ${RAG_DENSE_TOP_K:-20}
  RAG_FUSION_WINDOW: ${RAG_FUSION_WINDOW:-20}
  RAG_RRF_K: ${RAG_RRF_K:-60}
  RAG_RERANK_TOP_N: ${RAG_RERANK_TOP_N:-10}
  RAG_TEXT_SEARCH_CONFIG: ${RAG_TEXT_SEARCH_CONFIG:-simple}
  OCR_PROVIDER: ${OCR_PROVIDER:-glm_ocr}
  LLM_OCR_BASE_URL: ${LLM_OCR_BASE_URL:-https://api.z.ai/api/paas/v4/layout_parsing}
  LLM_OCR_API_KEY: ${LLM_OCR_API_KEY:-}
  LLM_OCR_MODEL: ${LLM_OCR_MODEL:-glm-ocr}
  LLM_OCR_TIMEOUT_SECONDS: ${LLM_OCR_TIMEOUT_SECONDS:-240}
  LLM_OCR_MAX_RETRIES: ${LLM_OCR_MAX_RETRIES:-2}
  LLM_OCR_RETRY_BACKOFF_SECONDS: ${LLM_OCR_RETRY_BACKOFF_SECONDS:-0.5}
  LLM_OCR_VERIFY_SSL: "${LLM_OCR_VERIFY_SSL:-true}"
  OCR_FORCE_FULL_DOCUMENT: "${OCR_FORCE_FULL_DOCUMENT:-false}"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: paper_archive
      POSTGRES_USER: paper_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper_user -d paper_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      <<: *backend-common-env
      APP_SECRET_KEY: ${APP_SECRET_KEY:-please_change_me_in_production}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:3000}
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
    volumes:
      - files_data:/data/files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build: ./backend
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info"]
    environment:
      <<: *backend-common-env
    volumes:
      - files_data:/data/files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_EDITOR_BASE_URL: ${PUBLIC_ORIGIN:-http://localhost:3000}/n8n/
      WEBHOOK_URL: ${PUBLIC_ORIGIN:-http://localhost:3000}/n8n/
      N8N_PROXY_HOPS: 1
      N8N_PATH: /n8n/
      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_PORT: 5678
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      TZ: ${GENERIC_TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
  files_data:
